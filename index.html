<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width; initial-scale=1.0; maximum-scale=1.0">
    <meta name="author" content="João Santos">
    <meta name="keyword" content="palavras,separadas,por,virgulas">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Cardápio</title>
</head>
<body>
    
    <div class="notf" id="notf">
        <span id="notfR"></span>
    </div><!--notf-->
    <header>
        <i class="fa-solid fa-arrow-left"></i>
        <div class="txt-t">
                <h1>Cardápio</h1>
                <p>Fique à vontade para montar seu prato!</p>
            </div><!--txt-t-->
        <div class="container">
            <h1>Monte o seu pedido!</h1>
            <div class="btn-group">
                <div class="btn-m" id="btn-r">Resetar o pedido</div><!--rst-o-->
                <div class="btn-m" id="chk-o">Checar pedido</div><!--chk-o-->
                <div class="btn-m" id="ord-n">Finalizar pedido</div><!--ord-n-->
            </div><!--btn-group-->
        </div><!--container-->
    </header>

    <section class="s-main">
        <div class="container">
            <div class="order-box">
                <div class="g-size groups">
                    <h1 class="title-g">Tamanho</h1>
                    <div class="size-btns">
                        <button class="btn-order" data-size="Pequeno">Pequeno</button>
                        <button class="btn-order" data-size="Médio">Médio</button>
                        <button class="btn-order" data-size="Grande">Grande</button>
                        <button class="btn-order" data-size="Família">Família</button>
                        <button class="btn-order" data-size="Super Família">Super Família</button>
                    </div><!--size-btns-->
                </div><!--g-size-->

                <div class="g-flavor groups">
                    <h1 class="title-g">Sabores</h1>
                    <div class="size-btns">
                        <button class="btn-order" data-flavors="Calabresa">Calabresa</button>
                        <button class="btn-order" data-flavors="Frango com Catupiry">Frango com Catupiry</button>
                        <button class="btn-order" data-flavors="Portuguesa">Portuguesa</button>
                        <button class="btn-order" data-flavors="Quatro queijos">Quatro queijos</button>
                        <button class="btn-order" data-flavors="Vegetariana">Vegetariana</button>
                    </div><!--size-btns-->
                </div><!--g-flavor groups-->

                <div class="g-tborder groups">
                    <h1 class="title-g">Tipo de borda</h1>
                    <div class="size-btns">
                        <button class="btn-order" data-dough="Massa fina + sem borda">Massa fina</button>
                        <button class="btn-order" data-dough="Massa fina + com borda">Massa fina + borda</button>
                        <button class="btn-order" data-dough="Massa grossa + com borda">Massa grossa</button>
                        <button class="btn-order" data-dough="Massa grossa + sem borda">Massa grossa - borda</button>
                    </div><!--size-btns-->
                </div><!--g-tborder groups-->

                <div class="g-border groups">
                    <h1 class="title-g">Bordas</h1>
                    <div class="size-btns">
                        <button class="btn-order" data-border="Borda de chocolate">Chocolate</button>
                        <button class="btn-order" data-border="Borda de catupiry">Catupiry</button>
                        <button class="btn-order" data-border="Borda de cheddar">Cheddar</button>
                    </div><!--size-btns-->
                </div><!--g-border groups-->

                <div class="g-drink groups">
                    <h1 class="title-g">Bebidas</h1>
                    <div class="size-btns">
                        <button class="btn-order" data-drinks="Coca-Cola">Coca-Cola</button>
                        <button class="btn-order" data-drinks="Guaraná">Guaraná</button>
                        <button class="btn-order" data-drinks="Suco de Laranja">Suco de Laranja</button>
                        <button class="btn-order" data-drinks="Pepsi">Pepsi</button>
                    </div><!--size-btns-->
                </div><!--g-drink groups-->
            </div><!--order-box-->
            <aside class="order-resume">
                <form>
                    <h1>Resumo do pedido</h1>
                    <div class="resume-box">
                        <p id="resume-size"></p>
                        <p id="resume-flavor"></p>
                        <p id="resume-dough"></p>
                        <p id="resume-border"></p>
                        <p id="resume-drinks"></p>
                    </div><!--resume-box-->
                </form>
            </aside><!--order-resume-->
        </div><!--container-->
    </section><!--s-main-->

    <!--input-order < id para reset de pedido-->


    <script type="module" src="js/function.js"></script>
</body>
</html>
